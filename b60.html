<html>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1">
  <title>Et-Un Base 60</title>
  <style type="text/css">
    div.b60 {
      display:        inline-block;
      font-size:      0.3em;
      margin:         0.025em;
      text-align:     right;
    }
    div.b60>div {
      display:        inline-block;
      height:         1.75em;
      margin-bottom:  0.25em;
      width:          1.75em;
    }
    div.b60>div>div {
      display:        inline-block;
      border-style:   none;
      border-width:   0.25em;
      box-sizing:     border-box;
      height:         1em;
      position:       absolute;
      width:          1em;
    }
    div.b60>div>div:nth-child(1) { margin:             0        0       0      -1.75em  ;
                                   border-radius:      0.5em    0.375em  0      0.5em   ; }
    div.b60>div>div:nth-child(2) { margin:             0        0       0      -1em     ;
                                   border-radius:      0.375em  0.5em   0.5em   0       ; }
    div.b60>div>div:nth-child(3) { margin:             0.75em   0       0      -1em     ;
                                   border-radius:      0        0.5em   0.25em  0.125em ; }
    div.b60>div>div:nth-child(4) { margin:             0.75em   0       0      -1.75em  ;
                                   border-radius:      0.5em    0       0.125em 0.25em  ; }
    div.b60>div>div:nth-child(3) { border-top-style: solid; }
    div.b60>div>div:nth-child(4) { border-top-style: solid; }
    div.b60>div._01>div:nth-child(1) { border-style: solid solid none  none ; }
    div.b60>div._02>div:nth-child(1) { border-style: solid                  ; }
    div.b60>div._11>div:nth-child(2) { border-style: solid none  none  solid; }
    div.b60>div._12>div:nth-child(2) { border-style: solid                  ; }
    div.b60>div._21>div:nth-child(3) { border-style: solid none  solid solid; }
    div.b60>div._22>div:nth-child(3) { border-style: solid                  ; }
    div.b60>div._31>div:nth-child(4) { border-style: solid solid solid none ; }
    div.b60>div._32>div:nth-child(4) { border-style: solid                  ; }
    .b60 span.name { font-size: 60%; }
    table.b60 td {
      border:         0.01em solid #eeeeee;
      padding:        0.2em;
      text-align:     right;
      font-size:      8em;
    }
  </style>
  <script type="text/javascript">
    var name_parts = [
      [ ''  , 'ta', 'ru'],
      [ ''  , 'si', 'go'],
      [ ''  , 'll', 'tt'],
      [ 'un', 'et', 'ok']
    ];
    function base3(n) {
      var r = n % 3;
      return n == r ? n.toString() : base3((n - r) / 3) + r;
    }
    function base60char(n_10) {
      var n_3 = base3(n_10).padStart(4, '0').split('');
      var b = 3;
      var html = '<div class="b60"><div class="' +
        n_3.map(c => '_' + b-- + c).join(' ') +
        '"><div></div><div></div><div></div><div></div></div></div>';
      var name = n_3.reduce((name, _) => {return name + name_parts[++b][_]}, '');
      name = name.replace(/^([lt])\1/, '$1');
      name = name.replace(/([ou])\1/, '$1h$1');
      return {'html': html, 'name': name};
    }
    function base60(n) {
      function _base60(n) {
        var r = n % 60;
        var b81c = base60char(r);
        if (n == r) return b81c;
        var b60 = _base60((n - r)/60);
        b60.html += b81c.html;
        b60.name += '-' + b81c.name;
        return b60;
      }
      var b = _base60(n);
      var log60 = (b.name.match(/-/g) || []).length + 1;
      if (log60 > 1) b.name = _base60(log60).name + 'ji-' + b.name;
      return b;
    }
    function showBase60(n = 60**2, i0 = 0, m = 12) {
      document.write('<table class="b60"><tbody>');
      var row = '';
      for (var i = i0; i < n; i++) {
        var r = i % m;
        if (r == 0) row += '<tr>';
        var b60 = base60(i);
        row += '<td>' + b60.html + '<br/>' +
               '<span class="name">' + b60.name + '</span><br/>' +
               i + '</td>';
        if (r == m - 1) {
          row += '</tr>';
          document.write(row + "\n");
          row = '';
        }
      }
      document.write('</tbody></table>' + "\n");
    }
  </script>
</head>

<body>
  <h1><em>Et-Un</em> Base 60</h1>
  <script type="text/javascript">
    document.write('<p>'+base60(744).html+'/'+base60(12).html+'='+base60(62).html+'</p>');
    showBase60(3 + 98,        0,            6);
    showBase60(3 + 987,       987-60,       3);
    showBase60(3 + 9876,      9876-60,      3);
    showBase60(3 + 98765,     98765-60,     3);
    showBase60(3 + 987654,    987654-60,    3);
    showBase60(3 + 9876543,   9876543-60,   3);
    showBase60(3 + 98765432,  98765432-60,  3);
    showBase60(3 + 987654321, 987654321-60, 3);
  </script>
</body>
</html>
