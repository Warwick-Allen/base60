<html>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1">
  <title>JÄ« Base 60</title>
  <style type="text/css">
    body {
      font-size:      24em;
    }
    div.b60 {
      display:        inline-block;
      font-size:      0.3em;
      margin:         0.025em;
      text-align:     right;
    }
    div.b60>div {
      display:        inline-block;
      height:         1.75em;
      margin-bottom:  0.25em;
      width:          1.75em;
    }
    div.b60>div>div {
      display:        inline-block;
      border-style:   none;
      border-radius:  0.5em;
      border-width:   0.25em;
      box-sizing:     border-box;
      height:         1em;
      position:       absolute;
      width:          1em;
    }
    div.b60>div>div:nth-child(1) { margin: 0        0 0 -1.75em; border-bottom-right-radius: 0 }
    div.b60>div>div:nth-child(2) { margin: 0        0 0 -1em   ; border-bottom-left-radius:  0 }
    div.b60>div>div:nth-child(3) { margin: 0.75em   0 0 -1em   ; border-top-left-radius:     0 }
    div.b60>div>div:nth-child(4) { margin: 0.75em   0 0 -1.75em; border-top-right-radius:    0 }
    div.b60>div>div:nth-child(4) { border-right-style: solid }
    div.b60>div._01>div:nth-child(1) { border-style: none  none  solid solid }
    div.b60>div._02>div:nth-child(1) { border-style: solid solid none  none  }
    div.b60>div._11>div:nth-child(2) { border-style: none  solid solid none  }
    div.b60>div._12>div:nth-child(2) { border-style: solid none  none  solid }
    div.b60>div._21>div:nth-child(3) { border-style: solid solid none  none  }
    div.b60>div._22>div:nth-child(3) { border-style: solid }
    div.b60>div._31>div:nth-child(4) { border-style: solid }
    div.b60>div._32>div:nth-child(4) { border-style: solid }
    .b60 span.ipa  { font-size: 40%; font-family: sans-serif }
    .b60 span.name { font-size: 60%; font-family:      serif }
    div.equation {
      display: block;
      white-space: nowrap;
    }
    table.b60 {
      display:        inline-block;
      text-align:     right;
    }
    table.b60 td {
      border:         0.01em solid #eeeeee;
      padding:        0.2em;
      font-size:      30em;
    }
  </style>
  <script type="text/javascript">
    var name_parts = [
      [ ''  , 'ta', 'ru'],
      [ ''  , 'si', 'go'],
      [ ''  , 'll', 'tt'],
      [ 'un', 'et', 'ok']
    ];
    function base3(n) {
      var r = n % 3;
      return n == r ? n.toString() : base3((n - r) / 3) + r;
    }
    String.prototype.replaceWithCharCode = function (a, b) {
      var re = new RegExp(a, 'g');
      return this.replace(re, String.fromCharCode(b));
    };
    function base60char(n_10) {
      var n_3 = base3(n_10).padStart(4, '0').split('');
      var b = 3;
      var html = '<div class="b60"><div class="' +
        n_3.map(c => '_' + b-- + c).join(' ') +
        '"><div></div><div></div><div></div><div></div></div></div>';
      var name = n_3.reduce((name, _) => {return name + name_parts[++b][_]}, '');
      name = name.replace(/^([lt])\1/, '$1');
      name = name.replace(/([ou])\1/, '$1h$1');
      var ipa = name.
        replace(/(.)\1/g, '$1.').
        replace(/\.'/g, "'").
        replace(/h/g, '.h').
        replace(/i/g, 'Éª').
        replace(/o/g, 'É').
        replace(/u/g, 'É').
        replace(/ta/g, 'tÊ.').
        replace(/\.(.\.)/g, '$1').
        replace(/-/g, '|')
      ;
      return {
        'html': html,
        'ipa' : ipa,
        'name': name
      };
    }
    function base60(n) {
      function _base60(n) {
        var r = n % 60;
        var b81c = base60char(r);
        if (n == r) return b81c;
        var b60 = _base60((n - r)/60);
        b60.html += b81c.html;
        b60.name += '-' + b81c.name;
        b60.ipa  += '.' + b81c.ipa;
        return b60;
      }
      var b = _base60(n);
      var log60 = (b.name.match(/-/g) || []).length + 1;
      if (log60 > 1) {
        var b_log60 = _base60(log60);
        b.name = b_log60.name + 'jÄ«-' + b.name;
        b.ipa  = b_log60.ipa + "'dÊiË." + b.ipa;
      }
      b.ipa = '/' + b.ipa + '/';
      return b;
    }
    function showBase60(n = 60**2, i0 = 0, m = 12) {
      document.write('<table class="b60"><tbody>');
      var row = '';
      for (var i = i0; i < n; i++) {
        var r = i % m;
        if (r == 0) row += '<tr>';
        var b60 = base60(i);
        row += '<td>' + b60.html + '<br/>' +
               '<span class="name">' + b60.name + '</span><br/>' +
               '<span class="ipa" >' + b60.ipa  + '</span><br/>' +
               i + '</td>';
        if (r == m - 1) {
          row += '</tr>';
          document.write(row + "\n");
          row = '';
        }
      }
      document.write('</tbody></table>' + "\n");
    }
  </script>
</head>

<body>
  <h1>
    <em>JÄ«</em> Base 60
  </h1>
  <div style="text-align: right;">
    <script type="text/javascript">
      document.write('<div class="equation">'+base60(744).html+'/'+base60(12).html+'='+base60( 62).html+'</div>');
      document.write('<div class="equation"><span style="font-size:80%">744/12= 62</span></div>');
      document.write('<div class="equation">'+base60(888).html+'+'+base60(72).html+'='+base60(960).html+'</div>');
      document.write('<div class="equation"><span style="font-size:80%">888+72=960</span></div>');
      showBase60(3 + 9,         0,            1);
      showBase60(3 + 98,        98       -86, 1);
      showBase60(3 + 987,       987      -86, 1);
      showBase60(3 + 9876,      9876     -86, 1);
      showBase60(3 + 98765,     98765    -86, 1);
      showBase60(3 + 987654,    987654   -86, 1);
      showBase60(3 + 9876543,   9876543  -86, 1);
      showBase60(3 + 98765432,  98765432 -86, 1);
      showBase60(3 + 987654321, 987654321-86, 1);
    </script>
  </div>
</body>
</html>
